<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Image Intel | Tactical Mode</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #f4f7f4;
            background-image: 
                linear-gradient(#e0e7e0 1px, transparent 1px),
                linear-gradient(90deg, #e0e7e0 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 2;
            margin: 0;
            padding: 20px 10px;
            color: #2b302b;
            text-align: center;
        }

        header h1 {
            color: #4b5320;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        main {
            background: #ffffff;
            max-width: 950px;
            margin: 0 auto;
            padding: 24px;
            border: 2px solid #4b5320;
            box-shadow: 8px 8px 0px rgba(75, 83, 32, 0.2);
        }

        h2 {
            color: #556b2f;
            font-size: 1.2rem;
            border-bottom: 1px solid #d0d7d0;
            text-transform: uppercase;
            padding: 10px;
            padding-bottom: 12px;
            margin-bottom: 22px;
        }

        .upload-zone {
            border: 2px dashed #4b5320;
            padding: 20px;
            margin-bottom: 20px;
            background: #f9fdf9;
            transition: background 0.3s;
            cursor: pointer;
        }

        .upload-zone:hover {
            background: #eef5ee;
        }

        .upload-zone p {
            margin-bottom: 15px;
            font-weight: bold;
            color: #4b5320;
        }

        .path-zone {
            background: #f0f2f0;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #4b5320;
        }

        .path-zone p {
            margin-bottom: 10px;
            font-weight: bold;
            color: #4b5320;
        }

        input[type="file"]::file-selector-button {
            font-family: 'Courier New', monospace;
            background-color: #4b5320;
            color: white;
            padding: 6px 12px;
            border: 1px solid #4b5320;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bolder;
            font-size: 14px;
            margin-left: 15px;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #353b16;
        }

        input[type="file"] {
            font-size: 12px;
            color: #4b5320;
        }

        input[type="text"] {
            width: 85%;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border: 1px solid #4b5320;
            background: #fdfdfd;
            outline: none;
        }

        button {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background-color: #4b5320;
            color: #ffffff;
            padding: 12px 30px;
            border: none;
            font-weight: bolder;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #353b16;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #000000;
            text-transform: uppercase;
        }
        
        .error-msg {
            font-size: 1rem;
            font-weight: bold;
            color: #f72222;
            text-align: center;
            background-color: #fdfdfd;
            border: 1px solid #f72222;
            padding: 18px;
            margin: 18px auto;
            width: fit-content;
        }

        .close-btn {
            background-color: #4b5320;
            color: #ffffff;
            text-decoration: none;
            padding: 6px 20px;
            display: inline-block;
            margin-top: 15px;
        }
        
        .close-btn:hover {
            background-color: #353b16;
        }
    </style>
</head>
<body>
    <header>
        <h1>{ IMAGE INTEL }</h1>
    </header>

    {% if error %}
        <p class="error-msg">
            {{ error|safe }}
            <br>
            <a href="/" class="close-btn">אישור</a>
        </p>
    {% endif %}

    <main>
        <h2>מערכת חילוץ מודיעין מתמונות</h2>
        <form action="/stage_files" method="POST">
            
            <div class="upload-zone">
                <p>אפשרות 1: <br>בחר / גרור תמונות לכאן</p>
                <input type="file" name="images" multiple accept="image/jpeg, image/png, image/jpg">
            </div>

            <div class="path-zone">
                <p>אפשרות 2: <br>הזן נתיב מקומי</p>
                <input type="text" name="local_folder" placeholder="הזן נתיב תיקייה לסריקה...">
            </div>

            <button type="submit">הפעל סריקת תמונות</button>
        </form>

        {% if timeline_html %}
            <div id="results">
                {{ timeline_html|safe }}
            </div>
        {% endif %}
    </main>

    <footer>
        <p>Image Intel 2026 © | Team: elyasaf, moshe, avi, yehuda, aviv</p>
    </footer>
</body>
</html>
