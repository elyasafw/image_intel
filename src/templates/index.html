<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Image Intel | Tactical Mode</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #f4f7f4;
            background-image: 
                linear-gradient(#e0e7e0 1px, transparent 1px),
                linear-gradient(90deg, #e0e7e0 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 2;
            margin: 0;
            padding: 50px 20px;
            color: #2b302b;
            text-align: center;
        }

        header h1 {
            color: #4b5320;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        main {
            background: #ffffff;
            max-width: 950px;
            margin: 0 auto;
            padding: 40px;
            border: 2px solid #4b5320;
            box-shadow: 8px 8px 0px rgba(75, 83, 32, 0.2);
        }

        h2 {
            color: #556b2f;
            font-size: 1.2rem;
            border-bottom: 1px solid #d0d7d0;
            text-transform: uppercase;
            padding: 10px;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        input {
            width: 85%;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border: 1px solid #4b5320;
            background: #fdfdfd;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            font-family: 'Courier New', monospace;
            font-size: 15px;
            background-color: #4b5320;
            color: #ffffff;
            padding: 15px 30px;
            border: none;
            font-weight: bolder;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #353b16;
        }

        footer {
            margin-top: 80px;
            font-size: 0.8rem;
            color: #000000;
            text-transform: uppercase;
        }
        
        .error-msg {
            font-size: 1rem;
            font-weight: bold;
            color: #f72222;
            text-align: center;
            background-color: #fdfdfd;
            border: 1px solid #f72222;
            padding: 20px;
            margin: 20px auto;
            width: fit-content;
        }

        .close-btn {
            background-color: #4b5320;
            color: #ffffff;
            text-decoration: none;
            padding: 6px 20px;
            display: inline-block;
            margin-top: 15px;
        }
        
        .close-btn:hover {
            background-color: #353b16;
        }
    </style>
</head>
<body>
    <header>
        <h1>{ IMAGE INTEL }</h1>
    </header>

    {% if error %}
        <p class="error-msg">
            {{ error|safe }}
            <br>
            <a href="/" class="close-btn">אישור</a>
        </p>
    {% endif %}

    <main>
        <h2>מערכת חילוץ מודיעין מתמונות</h2>
        <form action="/analyze" method="POST">
            <input type="text" name="folder_path" placeholder="הזן נתיב תיקייה לסריקה..." required>
            <br>
            <button type="submit">הפעל סריקת תמונות</button>
        </form>

        {% if timeline_html %}
            <div id="results">
                {{ timeline_html|safe }}
            </div>
        {% endif %}
    </main>

    <footer>
        <p>Image Intel 2026 © | Team: elyasaf, moshe, avi, yehuda, aviv</p>
    </footer>
</body>
</html>
